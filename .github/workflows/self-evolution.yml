name: Self Evolution

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Harness
        shell: pwsh
        run: .\scripts\check.ps1

      - name: Next evolution batch
        shell: pwsh
        run: .\scripts\evolve.ps1 -Mode next
